trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

jobs:

  # ── STEP 1: Figure out what changed ──────────────────────────────
  - job: DetectChanges
    steps:
      - checkout: self
        fetchDepth: 0

      - bash: |
          CHANGED=$(git diff --name-only HEAD HEAD~1)

          echo "Changed files:"
          echo "$CHANGED"

          # Set a flag for each API folder
          echo "##vso[task.setvariable variable=buildApi1;isOutput=true]$(echo "$CHANGED" | grep -q 'api1/' && echo 'yes' || echo 'no')"
          echo "##vso[task.setvariable variable=buildApi2;isOutput=true]$(echo "$CHANGED" | grep -q 'api2/' && echo 'yes' || echo 'no')"
          echo "##vso[task.setvariable variable=buildApi3;isOutput=true]$(echo "$CHANGED" | grep -q 'api3/' && echo 'yes' || echo 'no')"
        name: flags

  # ── STEP 2: Build each API only if its flag is "yes" ─────────────
  - job: BuildApi1
    dependsOn: DetectChanges
    condition: eq(dependencies.DetectChanges.outputs['flags.buildApi1'], 'yes')
    steps:
      - script: echo "Building API 1"

  - job: BuildApi2
    dependsOn: DetectChanges
    condition: eq(dependencies.DetectChanges.outputs['flags.buildApi2'], 'yes')
    steps:
      - script: echo "Building API 2"

  - job: BuildApi3
    dependsOn: DetectChanges
    condition: eq(dependencies.DetectChanges.outputs['flags.buildApi3'], 'yes')
    steps:
      - script: echo "Building API 3"
